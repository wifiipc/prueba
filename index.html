    <style>
        /* ========================================= */
        /* --- 1. FUENTES Y VARIABLES BASE ---       */
        /* ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Dancing+Script:wght@700&family=Pacifico&display=swap');

        *, *::after, *::before { padding: 0; margin: 0; box-sizing: border-box; }
        
        :root { 
            --dark-bg: #050505; 
            --accent: #ff4d6d;
            --accent-hover: #ff2a55;
            --glass-bg: rgba(30, 30, 30, 0.45);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        html { background-color: var(--dark-bg); overscroll-behavior: none; height: 100vh; height: 100dvh; }
        body { 
            margin: 0; padding: 0; background-color: var(--dark-bg); 
            font-family: 'Montserrat', sans-serif; color: var(--text-main); 
            height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; 
            -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; 
        }

        /* Contenedor de escenas (scroll) */
        #main-container { 
            height: 100vh; height: 100dvh; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; 
            scroll-behavior: smooth; position: absolute; top: 0; left: 0; scrollbar-width: none; 
        }
        #main-container::-webkit-scrollbar { display: none; }
        
        /* ========================================= */
        /* --- 2. BOTÓN VOLVER ---                   */
        /* ========================================= */
        #back-btn { 
            position: fixed; top: 25px; left: 20px; z-index: 50000; 
            background: var(--glass-bg); color: white; border: 1px solid var(--glass-border); 
            padding: 10px 20px; border-radius: 20px; font-family: 'Montserrat', sans-serif; 
            font-size: 0.85rem; font-weight: 500; cursor: pointer; display: none; 
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        #back-btn:hover { background: var(--accent); border-color: var(--accent); transform: translateX(-5px); }
